<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h1>Parameter Global (Read-Only)</h1>
      <p class="subtitle">Daftar List of Values (LOV) global konfigurasi sistem</p>
    </div>
  </div>

  <!-- Filter Card -->
  <mat-card class="filter-card shadow-premium">
    <mat-card-content class="filter-content">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Cari Parameter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Cari berdasarkan group, key, atau value..." #input>
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <!-- Table Card -->
  <mat-card class="table-card shadow-premium">
    <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>
    
    <mat-card-content class="table-content">
      <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" matSort>
          <!-- Group Name Column -->
          <ng-container matColumnDef="group_name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Group Name </th>
            <td mat-cell *matCellDef="let row">
              <span class="group-badge">{{ row.group_name }}</span>
            </td>
          </ng-container>

          <!-- Key Column -->
          <ng-container matColumnDef="key">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Key </th>
            <td mat-cell *matCellDef="let row"> <strong>{{ row.key }}</strong> </td>
          </ng-container>

          <!-- Value Column -->
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Value </th>
            <td mat-cell *matCellDef="let row"> {{ row.value }} </td>
          </ng-container>

          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Deskripsi </th>
            <td mat-cell *matCellDef="let row"> {{ row.description || '-' }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row no-data-row" *matNoDataRow>
            <td class="mat-cell" colspan="4" *ngIf="!isLoading">
              Tidak ada data yang cocok dengan pencarian "{{ input.value }}"
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Pilih halaman parameter"></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
